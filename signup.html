<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CivicInsight — Register</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --s:#E8500A;--sl:#FF7A35;
  --deep:#070709;--ink:#0E0E14;--lift:#181820;
  --bdr:rgba(232,80,10,.15);--bdr2:rgba(255,255,255,.07);
  --txt:#EDEAE5;--txt2:#B0ACBA;--txt3:#6E6A7A;
  --green:#0FC88A;--red:#F04040;
}
body{background:var(--deep);color:var(--txt);font-family:'Outfit',sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:28px 20px;position:relative;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(232,80,10,.03) 1px,transparent 1px),
  linear-gradient(90deg,rgba(232,80,10,.03) 1px,transparent 1px);background-size:50px 50px}
.glow{position:fixed;width:600px;height:600px;border-radius:50%;pointer-events:none;z-index:0;
  background:radial-gradient(circle,rgba(232,80,10,.07) 0%,transparent 65%);
  top:50%;left:50%;transform:translate(-50%,-50%)}
.back{position:fixed;top:22px;left:24px;z-index:10;color:var(--txt3);
  text-decoration:none;font-size:.85rem;transition:color .2s}
.back:hover{color:var(--txt)}
.card{position:relative;z-index:1;width:100%;max-width:470px;background:var(--ink);
  border:1px solid var(--bdr);border-radius:20px;padding:42px 38px;
  animation:up .4s ease}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.clogo{font-size:1.3rem;font-weight:800;text-align:center;margin-bottom:26px}
.clogo span{color:var(--sl)}
.ctitle{font-size:1.4rem;font-weight:800;margin-bottom:4px;letter-spacing:-.5px}
.csub{color:var(--txt3);font-size:.875rem;margin-bottom:22px}

.rtabs{display:flex;gap:5px;background:rgba(0,0,0,.4);border-radius:10px;padding:4px;margin-bottom:22px}
.rtab{flex:1;padding:9px 4px;border:none;border-radius:7px;background:transparent;
  color:var(--txt3);font-family:'Outfit',sans-serif;font-size:.83rem;font-weight:500;
  cursor:pointer;transition:all .2s;text-align:center}
.rtab.on{background:var(--s);color:#fff;font-weight:700}

.field{margin-bottom:13px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
label{display:block;font-size:.71rem;color:var(--txt3);margin-bottom:5px;
  font-weight:500;text-transform:uppercase;letter-spacing:.5px}
input,select{width:100%;background:rgba(0,0,0,.4);border:1px solid var(--bdr2);
  border-radius:10px;padding:12px 14px;color:var(--txt);font-family:'Outfit',sans-serif;
  font-size:.875rem;outline:none;transition:border-color .2s,box-shadow .2s}
select option{background:var(--lift)}
input:focus,select:focus{border-color:rgba(232,80,10,.5);box-shadow:0 0 0 3px rgba(232,80,10,.08)}
input::placeholder{color:var(--txt3)}

.officer-sec{display:none}
.officer-sec.show{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sdivider{height:1px;background:var(--bdr2);margin:16px 0 13px;position:relative}
.sdivider span{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  background:var(--ink);padding:0 12px;font-size:.7rem;
  color:var(--txt3);font-family:'JetBrains Mono',monospace}

.sbtn{width:100%;padding:13px;background:var(--s);border:none;border-radius:10px;
  color:#fff;font-family:'Outfit',sans-serif;font-size:.95rem;font-weight:700;
  cursor:pointer;transition:all .2s;box-shadow:0 4px 18px rgba(232,80,10,.25);margin-top:5px}
.sbtn:hover{background:var(--sl);transform:translateY(-1px)}
.sbtn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.alt{text-align:center;margin-top:18px;color:var(--txt3);font-size:.875rem}
.alt a{color:var(--s);text-decoration:none;font-weight:600}
.alt a:hover{color:var(--sl)}
.msg{border-radius:8px;padding:10px 14px;font-size:.84rem;margin-bottom:12px;display:none}
.msg.on{display:block}
.msg.err{background:rgba(240,64,64,.08);border:1px solid rgba(240,64,64,.22);color:var(--red)}
.msg.ok{background:rgba(15,200,138,.08);border:1px solid rgba(15,200,138,.22);color:var(--green)}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.2);
  border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:480px){.frow{grid-template-columns:1fr}.card{padding:30px 20px}}
</style>
</head>
<body>
<div class="glow"></div>
<a href="index.html" class="back">← Wapas Jayein</a>
<div class="card">
  <div class="clogo">Civic<span>Insight</span></div>
  <div class="ctitle">Account Banayein 🚀</div>
  <p class="csub">Platform join karein — bilkul free.</p>

  <div class="rtabs">
    <button class="rtab on" onclick="setRole('USER',this)">🧑 Citizen</button>
    <button class="rtab"    onclick="setRole('OFFICER',this)">🏢 Officer</button>
  </div>

  <div class="msg err" id="errMsg"></div>
  <div class="msg ok"  id="okMsg"></div>

  <div class="frow field">
    <div><label>Pura Naam *</label><input type="text" id="rName" placeholder="Ramesh Kumar"/></div>
    <div><label>Username *</label><input type="text" id="rUname" placeholder="ramesh123"/></div>
  </div>
  <div class="field"><label>Email *</label><input type="email" id="rEmail" placeholder="aap@email.com"/></div>
  <div class="field"><label>Password *</label><input type="password" id="rPass" placeholder="••••••••"/></div>

  <div class="officer-sec" id="officerSec">
    <div class="sdivider"><span>// Officer Details</span></div>
    <div class="frow field">
      <div>
        <label>Department *</label>
        <select id="rDept">
          <option value="">-- Select --</option>
          <option>Municipal Department</option>
          <option>Animal Control Board</option>
          <option>Education Department</option>
          <option>Electricity Department</option>
        </select>
      </div>
      <div><label>City *</label><input type="text" id="rCity" placeholder="Budaun"/></div>
    </div>
  </div>

  <button class="sbtn" id="regBtn" onclick="doRegister()">Account Banayein</button>
  <p class="alt">Pehle se account hai? <a href="login.html">Login karein</a></p>
</div>

<script>
const API = 'https://civicinsight.onrender.com';
let role = 'USER';

function setRole(r, el) {
  role = r;
  document.querySelectorAll('.rtab').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  const sec = document.getElementById('officerSec');
  r === 'OFFICER' ? sec.classList.add('show') : sec.classList.remove('show');
  clearMsg();
}
function clearMsg() {
  document.getElementById('errMsg').classList.remove('on');
  document.getElementById('okMsg').classList.remove('on');
}
function showErr(m) { const e=document.getElementById('errMsg'); e.textContent='❌ '+m; e.classList.add('on'); }
function showOk(m)  { const e=document.getElementById('okMsg');  e.textContent='✅ '+m; e.classList.add('on'); }

async function doRegister() {
  const name     = document.getElementById('rName').value.trim();
  const username = document.getElementById('rUname').value.trim();
  const email    = document.getElementById('rEmail').value.trim();
  const password = document.getElementById('rPass').value.trim();
  clearMsg();
  if (!name || !username || !email || !password) { showErr('Sabhi * fields required hain.'); return; }

  let url, body;
  if (role === 'USER') {
    url  = `${API}/create/signup/user`;
    body = { name, username, password, email };
  } else {
    const department = document.getElementById('rDept').value;
    const city       = document.getElementById('rCity').value.trim();
    if (!department || !city) { showErr('Department aur city bhi required hain.'); return; }
    url  = `${API}/create/department_user/signup`;
    body = { name, username, password, email, department, city };
  }

  const btn = document.getElementById('regBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>Register ho raha hai...';

  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const text = await res.text();
    if (!res.ok) { showErr(text || `Server error (${res.status})`); return; }
    showOk('Account ban gaya! Login page par ja rahe hain...');
    setTimeout(() => window.location.href = 'login.html', 1400);
  } catch(e) {
    showErr('Backend connect nahi ho raha. VS Code Live Server se open karein.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Account Banayein';
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });
</script>
</body>
</html>
